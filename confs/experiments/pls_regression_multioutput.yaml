model_id: pls-regression-multioutput

dataset:
  dataset_dir: data/Data_Pattern
  recording_family: patt
  pattern_type: random
  image_rows: 6
  image_columns: 6
  feature_config_path: confs/features/default.yaml

split:
  test_size: 0.2
  random_state: 42
  group_by: subject
  require_both_classes: true

cross_validation:
  n_splits: 5
  shuffle: true
  random_state: 42
  scoring: balanced_accuracy

feature_screening:
  select_k: 100
  variance_threshold: 0.0
  candidates:
    - [time]
    - [spectral]
    - [time, spectral]
    - [covariance]
    - [correlation]
    - [log_covariance]
    - [lndp]
    - [lgp]
    - [lbp]

grid_search:
  estimator_family: pls_regression
  select_k: [25, 50, 100, 250]
  n_components: [2, 5, 10]
  screening_n_components: 2
  scale: false
  max_iter: 500
  tolerance: 0.000001
  n_jobs: -1
  error_score: raise

prediction_threshold: 0.5
bootstrap_iterations: 2000
random_state: 42

artifacts:
  root: artifacts/experiments/random-imagery
  schema_version: 3
  overwrite: false
