dataset:
  dataset_dir: data/Data_Pattern
  recording_family: patt
  pattern_type: random
  image_rows: 6
  image_columns: 6
  feature_config_path: confs/features/default.yaml

split:
  test_size: 0.2
  random_state: 42
  group_by: subject
  require_both_classes: true

cross_validation:
  n_splits: 5
  shuffle: true
  random_state: 42
  scoring: balanced_accuracy

feature_screening:
  select_k: 100
  variance_threshold: 0.0
  c: 1.0
  penalty: l2
  class_weight: balanced
  solver: liblinear
  max_iter: 5000
  candidates:
    - [time]
    - [spectral]
    - [time, spectral]
    - [covariance]
    - [correlation]
    - [log_covariance]
    - [lndp]
    - [lgp]
    - [lbp]

grid_search:
  select_k: [25, 50, 100, 250]
  c_values: [0.01, 0.1, 1.0, 10.0]
  penalties: [l1, l2]
  class_weights: [null, balanced]
  solver: liblinear
  max_iter: 5000
  n_jobs: -1
  error_score: raise

prediction_threshold: 0.5
bootstrap_iterations: 2000
random_state: 42

artifacts:
  root: artifacts/experiments/logistic-regression
  schema_version: 2
  overwrite: false
