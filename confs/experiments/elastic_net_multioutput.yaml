model_id: elastic-net-multioutput

dataset:
  dataset_dir: data/Data_Pattern
  recording_family: patt
  pattern_type: random
  image_rows: 6
  image_columns: 6
  feature_config_path: confs/features/default.yaml

split:
  test_size: 0.2
  random_state: 42
  group_by: subject
  require_both_classes: true

cross_validation:
  n_splits: 5
  shuffle: true
  random_state: 42
  scoring: balanced_accuracy

feature_screening:
  select_k: 100
  variance_threshold: 0.0
  candidates:
    - [time]
    - [spectral]
    - [time, spectral]
    - [covariance]
    - [correlation]
    - [log_covariance]
    - [lndp]
    - [lgp]
    - [lbp]

grid_search:
  estimator_family: elastic_net
  select_k: [25, 50, 100, 250]
  alpha_values: [0.001, 0.01, 0.1, 1.0]
  l1_ratios: [0.1, 0.5, 0.9, 1.0]
  screening_alpha: 0.01
  screening_l1_ratio: 0.5
  max_iter: 1000000
  tolerance: 0.001
  selection: cyclic
  n_jobs: -1
  error_score: raise

prediction_threshold: 0.5
bootstrap_iterations: 2000
random_state: 42

artifacts:
  root: artifacts/experiments/random-imagery
  schema_version: 3
  overwrite: false
